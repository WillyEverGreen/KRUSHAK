name: plant_disease_classifier
description: Minimal TFLite plant disease classification app

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera access
  camera: ^0.10.5+9

  # Image picker for gallery
  image_picker: ^1.0.7

  # HTTP for APIs (Qubrid, Gemini, GNews)
  http: ^1.2.0

  # Location for local news
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Local storage for caching
  shared_preferences: ^2.2.2

  # URL launcher for news articles
  url_launcher: ^6.2.2

  # TFLite
  tflite_flutter: ^0.11.0

  # Image processing
  image: ^4.1.3

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Speech-to-Text
  speech_to_text: ^7.0.0

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/remedies.json
    - assets/model.tflite
    - assets/class_indices.json
